apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-peakshield
  labels:
    app: peakshield
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.proxyPort }}
      targetPort: proxy
      protocol: TCP
      name: proxy
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: peakshield
